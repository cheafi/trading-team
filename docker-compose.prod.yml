# Production overrides for OCI Micro (1GB RAM)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  freqtrade:
    restart: always
    deploy:
      resources:
        limits:
          memory: 450M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  agent-runner:
    restart: always
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 50mb
      --maxmemory-policy allkeys-lru
      --save ""
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"

  # Dashboard disabled on micro instance — not enough RAM
  dashboard:
    profiles: ["full"]
